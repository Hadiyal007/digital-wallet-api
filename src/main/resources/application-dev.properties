# ============================================================
# DEV PROFILE ? local development only
# Activated by: SPRING_PROFILES_ACTIVE=dev
# Or set as default in IntelliJ Run Configuration > Active profiles: dev
#
# This profile is NEVER deployed to production.
# ============================================================

# ?? MySQL (local) ????????????????????????????????????????????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/walletdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate ????????????????????????????????????????????????
# update: adds new columns/tables without dropping existing data.
# Safe for local dev. Never use create-drop ? it wipes data on every restart.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ?? Dev-friendly logging ?????????????????????????????????????
# show-sql=true is useful locally to see what Hibernate generates.
# NEVER set this in prod ? it floods logs and can leak query params.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? H2 console ???????????????????????????????????????????????
# Enabled locally for schema inspection. Disabled in prod profile.
spring.h2.console.enabled=false

# ?? Dev logging level ????????????????????????????????????????
logging.level.com.wallet.digital_wallet=DEBUG
logging.level.org.springframework.security=DEBUG

# ?? Swagger / OpenAPI ????????????????????????????????????????
# Swagger UI is enabled in dev ? useful during development and demos.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true