# ============================================================
# DEV PROFILE ? local development only
# Activated by: SPRING_PROFILES_ACTIVE=dev
# Or set as default in IntelliJ Run Configuration > Active profiles: dev
#
# This profile is NEVER deployed to production.
# ============================================================

# ?? MySQL (local) ????????????????????????????????????????????
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/walletdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? Hibernate ????????????????????????????????????????????????
# validate: Hibernate checks the schema matches the entities on startup
# and fails fast if they've drifted, but never creates/alters tables
# itself. Flyway (see application.properties + db/migration/mysql/) now
# owns the schema. This USED to be 'update' - that was fine while the
# schema was still taking shape, but 'update' can only ever ADD things;
# it can't rename or drop a column, so it silently can't represent every
# kind of change a real project eventually needs. Flyway can.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ?? Dev-friendly logging ?????????????????????????????????????
# show-sql=true is useful locally to see what Hibernate generates.
# NEVER set this in prod ? it floods logs and can leak query params.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? H2 console ???????????????????????????????????????????????
# Enabled locally for schema inspection. Disabled in prod profile.
spring.h2.console.enabled=false

# ?? Dev logging level ????????????????????????????????????????
logging.level.com.wallet.digital_wallet=DEBUG
logging.level.org.springframework.security=DEBUG

# ?? Swagger / OpenAPI ????????????????????????????????????????
# Swagger UI is enabled in dev ? useful during development and demos.
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true