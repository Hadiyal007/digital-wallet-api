# ============================================================
# PROD PROFILE ? Render.com cloud deployment
# Activated by: SPRING_PROFILES_ACTIVE=prod  (set in Render dashboard)
#
# ALL sensitive values come from environment variables.
# No real credentials ever appear in this file ? it is committed to Git.
# ============================================================

# ?? PostgreSQL (Neon / Supabase / Render managed DB) ?????????
# DB_URL format for Neon:  jdbc:postgresql://ep-xxx.us-east-1.aws.neon.tech/neondb?sslmode=require
# DB_URL format for Render DB: jdbc:postgresql://dpg-xxx.oregon-postgres.render.com/walletdb
# DB_URL format for Supabase: jdbc:postgresql://db.xxx.supabase.co:5432/postgres
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? Connection pool (HikariCP) ???????????????????????????????
# Render free tier has limited concurrent connections.
# Neon free tier allows ~5 concurrent connections.
# Keep pool small to avoid "too many connections" errors on free tiers.
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ?? Hibernate ????????????????????????????????????????????????
# update: safe ? adds new columns/tables, never drops existing data.
# Once the schema is stable, switch to 'validate' and use Flyway for changes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ?? Production logging ???????????????????????????????????????
# show-sql=false: do NOT log SQL queries in production.
# Reasons: (1) floods logs, (2) hides real errors, (3) leaks query data.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ?? H2 console ???????????????????????????????????????????????
# MUST be disabled in production ? exposing an H2 web console on a
# public server is a critical security vulnerability.
spring.h2.console.enabled=false

# ?? Swagger / OpenAPI ????????????????????????????????????????
# Disabled in production ? no public API explorer on the live server.
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# ?? Production logging level ?????????????????????????????????
# WARN level: only log warnings and errors, not debug/info noise.
# Change to INFO temporarily when diagnosing a production issue.
logging.level.com.wallet.digital_wallet=WARN
logging.level.org.springframework.security=WARN
logging.level.root=WARN

# ?? CORS ?????????????????????????????????????????????????????
# Comma-separated list of frontend domains allowed to call this API.
# Set ALLOWED_ORIGINS in Render dashboard once you know your Vercel URL,
# e.g. https://digital-wallet.vercel.app
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# ?? Server config ????????????????????????????????????????????
# Render injects PORT env var ? your app must listen on it.
# The SERVER_PORT in application.properties defaults to 8080 which
# won't match what Render assigns. This overrides it.
server.port=${PORT:8080}