# ============================================================
# SHARED CONFIGURATION ? loaded in ALL environments (dev + prod + test)
# Database config lives in the profile-specific files:
#   application-dev.properties  (local MySQL)
#   application-prod.properties (Postgres on Render)
#   application-test.properties (H2 for mvn test)
# ============================================================

spring.application.name=Digital Wallet System

# ?? Default profile ??????????????????????????????????????????
# When SPRING_PROFILES_ACTIVE env var is NOT set (e.g. running locally
# without any configuration), Spring falls back to this default.
# This ensures local dev automatically picks up application-dev.properties
# without you having to set anything.
# Render always sets SPRING_PROFILES_ACTIVE=prod explicitly ? this is ignored there.
spring.profiles.default=dev

# ?? Server ???????????????????????????????????????????????????
# application-prod.properties overrides this with ${PORT:8080}
# so Render's dynamically assigned port is used in production.
server.port=${SERVER_PORT:8080}

# ?? JWT ??????????????????????????????????????????????????????
# MUST be overridden via JWT_SECRET env var in production.
# The long default below is ONLY for local dev ? not secure for prod.
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-this-before-deploying-anywhere-real-1234567890}

# Access tokens are now SHORT-LIVED (15 min) on purpose. Before refresh
# tokens existed, this was 1 hour (3600000ms) because there was no way
# to get a new one without logging in again. Now that /api/auth/refresh-token
# exists, the access token can be short (limiting the damage window if one
# is ever stolen) while the refresh token (below) keeps the user logged in.
jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}

# Refresh tokens are long-lived (7 days) and stored server-side (see the
# RefreshToken entity), so - unlike access tokens - they CAN be revoked
# (logout) before they naturally expire.
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ?? Transfer OTP ?????????????????????????????????????????????
# How long a transfer OTP is valid for (5 min), and how many wrong
# guesses are allowed before the pending transfer is invalidated and
# the user has to initiate again. See OtpService for delivery notes -
# there's no real email/SMS yet, so the OTP is logged to the console.
otp.expiration-ms=${OTP_EXPIRATION_MS:300000}
otp.max-attempts=${OTP_MAX_ATTEMPTS:3}

# ?? Monthly Statement Job ????????????????????????????????????
# Cron format: second minute hour day-of-month month day-of-week
# Default: 06:00 on the 1st of every month.
monthly-report.cron=${MONTHLY_REPORT_CRON:0 0 6 1 * ?}

# ?? Redis Caching ????????????????????????????????????????????
# Free options for local dev / free-tier deployment: Redis Cloud (30MB
# free tier) or Upstash (free tier, works well with Render). Locally,
# `docker run -p 6379:6379 redis` is the fastest way to get one running.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# Fail fast (2s) rather than hang a request if Redis is unreachable -
# combined with RedisCacheConfig's CacheErrorHandler, a Redis outage
# degrades to "always hit the database", it never breaks the endpoint.
spring.data.redis.timeout=2000ms

# How long the admin dashboard summary stays cached before the next
# request recomputes it from the database.
app.cache.dashboard-ttl-seconds=${DASHBOARD_CACHE_TTL_SECONDS:60}

# ?? API Rate Limiting ????????????????????????????????????????
# Auth endpoints (login/refresh) get a tight, IP-keyed limit to slow
# down brute-force attempts. Everything else gets a looser, per-user
# limit for general abuse protection. See RateLimitFilter.
rate-limit.auth-capacity=${RATE_LIMIT_AUTH_CAPACITY:5}
rate-limit.auth-refill-minutes=${RATE_LIMIT_AUTH_REFILL_MINUTES:1}
rate-limit.general-capacity=${RATE_LIMIT_GENERAL_CAPACITY:60}
rate-limit.general-refill-minutes=${RATE_LIMIT_GENERAL_REFILL_MINUTES:1}

# ?? Email (Feature #6) ??????????????????????????????????????
# Defaults target Gmail's SMTP relay. To use it:
#   1. Turn on 2-Step Verification on the sending Gmail account
#   2. Generate an "App Password" (myaccount.google.com/apppasswords)
#   3. Set MAIL_USERNAME to the Gmail address, MAIL_PASSWORD to the
#      16-character app password (NOT your normal Gmail password)
# Any other SMTP provider works too - just override MAIL_HOST/MAIL_PORT.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Fail fast (5s) instead of hanging the request thread if the SMTP server
# is unreachable - EmailService still catches this and logs it, so a mail
# outage never breaks registration/OTP/transactions.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ?? Demo data (DataInitializer) ??????????????????????????????
app.demo.admin-password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user-password=${DEMO_USER_PASSWORD:user123}