# ?? Server ??????????????????????????????????????
server.port=8080


# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/walletdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ?? App Info ?????????????????????????????????????
spring.application.name=Digital Wallet System

# H2 console (for local development browsing at /h2-console)
# This replaces the invalid "spring-boot-h2console" starter that was in pom.xml.
# The H2 console is built into Spring Boot ? no extra dependency needed.
spring.h2.console.enabled=true

# Demo data (used only by DataInitializer)
app.demo.admin-password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user-password=${DEMO_USER_PASSWORD:user123}

# JWT Configuration
# IMPORTANT: jwt.secret MUST be set to a long random value via env var in production.
# The local default below is ONLY for development and is NOT secure.
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-this-before-deploying-anywhere-real-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}