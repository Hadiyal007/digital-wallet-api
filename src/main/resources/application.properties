# ============================================================
# SHARED CONFIGURATION ? loaded in ALL environments (dev + prod + test)
# Database config lives in the profile-specific files:
#   application-dev.properties  (local MySQL)
#   application-prod.properties (Postgres on Render)
#   application-test.properties (H2 for mvn test)
# ============================================================

spring.application.name=Digital Wallet System

# ?? Default profile ??????????????????????????????????????????
# When SPRING_PROFILES_ACTIVE env var is NOT set (e.g. running locally
# without any configuration), Spring falls back to this default.
# This ensures local dev automatically picks up application-dev.properties
# without you having to set anything.
# Render always sets SPRING_PROFILES_ACTIVE=prod explicitly ? this is ignored there.
spring.profiles.default=dev

# ?? Server ???????????????????????????????????????????????????
# application-prod.properties overrides this with ${PORT:8080}
# so Render's dynamically assigned port is used in production.
server.port=${SERVER_PORT:8080}

# ?? JWT ??????????????????????????????????????????????????????
# MUST be overridden via JWT_SECRET env var in production.
# The long default below is ONLY for local dev ? not secure for prod.
jwt.secret=${JWT_SECRET:dev-only-secret-key-change-this-before-deploying-anywhere-real-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ?? Demo data (DataInitializer) ??????????????????????????????
app.demo.admin-password=${DEMO_ADMIN_PASSWORD:admin123}
app.demo.user-password=${DEMO_USER_PASSWORD:user123}