# ?? Test profile configuration ??????????????????????????????????????????????
# Activated via @ActiveProfiles("test") on all test classes.
# Overrides application.properties for the test environment only.

# H2 in-memory database ? no MySQL needed.
# MODE=MySQL: makes H2 accept MySQL-style SQL (important for any MySQL-specific
# syntax that might appear in your schema or queries).
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# DO NOT set spring.jpa.database-platform here.
# In Hibernate 6 (Spring Boot 3+), H2Dialect was relocated and its
# package changed. Specifying the old class name explicitly causes
# DialectResolutionException. Spring Boot auto-detects the correct
# H2 dialect when this property is absent ? always prefer auto-detection.

# ?? Flyway (Feature #10) ?????????????????????????????????????
# Explicitly OFF for tests, overriding application.properties' default
# of enabled=true. Tests use ddl-auto=create-drop against an ephemeral
# H2 database instead - simpler and faster for a fresh schema on every
# test run, and it means tests aren't coupled to migration history at
# all. The honest tradeoff: this means tests never actually verify the
# Flyway migration files themselves apply cleanly. A stricter setup
# would use Testcontainers with a real MySQL/Postgres container and run
# the actual Flyway migrations in tests too - a reasonable next step,
# deliberately left out here to keep the test setup simple and fast.
spring.flyway.enabled=false

# create-drop: fresh schema every test run, dropped when context closes.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable H2 web console in tests ? not needed, avoids port conflicts
spring.h2.console.enabled=false
