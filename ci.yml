name: CI

# Runs on every push and every PR targeting main. PRs get validated
# BEFORE merge, not after - the whole point of CI is catching a broken
# build/test at the point someone's about to merge it, not discovering
# it later on main.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven   # caches ~/.m2 between runs, keyed off pom.xml

      # 'verify' runs the full lifecycle up through the test and package
      # phases in one command (compile -> test -> package -> verify),
      # rather than calling `mvn test` and `mvn package` as two separate
      # steps that would each redo the compile phase.
      #
      # Tests run against H2 (see application-test.properties,
      # @ActiveProfiles("test") on every test class) - no MySQL, Postgres,
      # or Redis service container needed here. Email sending and Redis
      # caching are both designed to fail gracefully (EmailService's
      # try/catch, RedisCacheConfig's CacheErrorHandler) rather than
      # require a live connection, so the full Spring context still
      # starts cleanly in CI with neither service running.
      - name: Build and test
        run: mvn -B verify

      - name: Upload test results
        if: always()   # upload even if tests failed - that's when you need them most
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: target/surefire-reports/
          retention-days: 7

  frontend:
    name: Frontend (Vite/React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: digital-wallet-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: digital-wallet-frontend/package-lock.json

      # npm ci (not npm install): installs EXACTLY what's in
      # package-lock.json, and fails instead of silently updating it if
      # package.json and the lockfile have drifted apart. That's what CI
      # should do - install is for local dev, ci is for reproducible builds.
      - name: Install dependencies
        run: npm ci

      # There's no test script yet (see package.json) - `npm run build`
      # still catches a real, common class of bug: anything that compiles
      # locally in dev mode (Vite's dev server is lenient) but breaks
      # under a production build (stricter bundling, tree-shaking,
      # import resolution). A red CI check here means "don't merge this,
      # the production build is broken" even with zero unit tests.
      - name: Build
        run: npm run build
