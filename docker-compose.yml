version: "3.9"

# One-command local startup:
#   docker-compose up --build
#
# This starts:
#   1. MySQL 8 database (walletdb) on port 3306
#   2. Spring Boot API on port 8080
#
# First run takes ~2-3 minutes (pulls MySQL image, builds the Java app).
# Subsequent runs start in ~30 seconds (images are cached).
#
# To stop and remove containers:
#   docker-compose down
#
# To wipe the database volume (fresh start):
#   docker-compose down -v

services:

  # ── MySQL Database ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: digital-wallet-db
    environment:
      MYSQL_ROOT_PASSWORD: walletpass
      MYSQL_DATABASE: walletdb
    ports:
      - "3306:3306"
    volumes:
      # Named volume persists data between docker-compose up/down cycles.
      # Without this, the DB is wiped every time you restart the container.
      - wallet_db_data:/var/lib/mysql
    healthcheck:
      # Spring Boot will only start after MySQL is ready to accept connections.
      # Without this healthcheck, the app starts too fast and gets
      # "Communications link failure" because MySQL hasn't finished booting.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pwalletpass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Spring Boot API ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: digital-wallet-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # Override the DB_URL to point to the "db" service container name
      # instead of "localhost" (containers communicate by service name)
      DB_URL: jdbc:mysql://db:3306/walletdb
      DB_USERNAME: root
      DB_PASSWORD: walletpass
      # Change this to a strong secret in any real setup
      JWT_SECRET: docker-compose-dev-secret-change-this-for-anything-real-1234567890
      DEMO_ADMIN_PASSWORD: admin123
      DEMO_USER_PASSWORD: user123
    depends_on:
      db:
        # Only start the app after MySQL passes its health check
        condition: service_healthy

volumes:
  wallet_db_data: